<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUS - Citizen Unified Portal</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --dark-bg: #f8f9fa;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #eef2f5;
            color: var(--text-color);
        }
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }
        header h1 { margin: 0; font-size: 2rem; }
        header p { margin: 0.5rem 0 0 0; opacity: 0.9; }
        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        h2 { margin-top: 0; color: #111; }
        .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        .office-card {
            padding: 1rem;
            border-radius: 6px;
            border-left: 5px solid #ccc;
            background: var(--dark-bg);
        }
        .status-active { border-left-color: var(--success-color); color: var(--success-color); font-weight: bold;}
        .status-closed { border-left-color: var(--danger-color); color: var(--danger-color); font-weight: bold;}
        .form-group { margin-bottom: 1rem; }
        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        textarea { height: 80px; resize: vertical; }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #004085; }
        .qa-item {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
        }
        .qa-question { font-weight: bold; margin-bottom: 0.5rem; }
        .qa-answer { background: #f0f7ff; padding: 0.75rem; border-radius: 4px; border-left: 3px solid var(--primary-color); }
    </style>
</head>
<body>
    <header>
        <h1>🏛️ GRUS: Citizen Service Portal</h1>
        <p>Real-time updates and verified community information</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>📍 Live Office Availability</h2>
            <p class="subtitle">Check if local public offices are active right now.</p>
            <div id="office-list" class="grid-container">
                <p class="loading">Loading live office statuses...</p>
            </div>
        </section>

        <section class="card">
            <h2>💬 Verified Community Q&A</h2>
            <p class="subtitle">Ask questions or view official, verified answers from officers.</p>
            
            <form id="qa-form">
                <div class="form-group">
                    <input type="text" id="phone-input" placeholder="Your Phone Number" required maxlength="15">
                </div>
                <div class="form-group">
                    <textarea id="question-input" placeholder="Type your question here (e.g., What documents are needed for a new ration card?)" required></textarea>
                </div>
                <button type="submit">Submit Question</button>
            </form>

            <div id="qa-feed"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
